<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open in Lockbook</title>
</head>

<body>
    <h1>Unable to open your file</h1>
    <p>Click the link below to open it in Lockbook:</p>
    <a id="openAppLink" href="#">Open in App</a>

    <script>
        // Get query parameter from URL
        const params = new URLSearchParams(window.location.search);
        const fileId = params.get('uuid');

        const linkElem = document.getElementById('openAppLink');

        if (fileId) {
            linkElem.href = `lb://${fileId}`;
        } else {
            linkElem.textContent = "File ID not found";
            linkElem.style.pointerEvents = 'none';
            linkElem.style.color = '#888';
        }
    </script>
</body>

</html>
