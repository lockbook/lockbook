name: Deploy Flatpak

on:
  release:
    types: [published]
  workflow_dispatch:
  workflow_call:

jobs:
  deploy-flatpak:
    if: github.repository == 'lockbook/lockbook'
    runs-on: [self-hosted, ci]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Flatpak
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          nix-shell -p curl python3 python313Packages.aiohttp python313Packages.tomlkit --command "cargo run -p lbdev -- releaser linux desktop flatpak"
