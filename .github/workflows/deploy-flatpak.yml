name: Deploy Flatpak

on:
  release:
    types: [published]
  workflow_dispatch:
  workflow_call:

jobs:
  deploy-flatpak:
    if: github.repository == 'lockbook/lockbook'
    runs-on: [self-hosted, ci]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy public site
        run: nix-shell -p python3 python313Packages.aiohttp python313Packages.tomlkit --command "cargo run -p lbdev -- releaser desktop flatpak"
      - name: Create Flathub PR
        env:
          GH_TOKEN: ${{ secrets.FLATHUB_GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "New Release ${{ github.ref_name }}" \
            --body "Automated release PR " \
            --base master \
            --head ${{ github.ref_name }} \
            --repo flathub/net.lockbook.Lockbook
