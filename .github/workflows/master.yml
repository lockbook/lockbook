name: Master

on:
  push:
    branches: [ master ]

jobs:
  deploy-site:
    uses: ./.github/workflows/public-site.yml
    secrets: inherit

  deploy-android:
    uses: ./.github/workflows/android.yml
    secrets: inherit

  deploy-apple:
    uses: ./.github/workflows/apple.yml
    secrets: inherit

  build-linux:
    if: github.repository == 'lockbook/lockbook'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        run: |
          sudo apt-get install -y pkg-config cmake libfontconfig1-dev libxkbcommon-x11-dev libglib2.0-dev libgtk-3-dev libgdk-pixbuf-2.0-dev
      - name: Build server
        run: cargo build -p lockbook-server --release
      - name: Build CLI
        run: cargo build -p lockbook --release
      - name: Build egui
        run: cargo build -p lockbook-egui --release
      - name: Build linux
        run: cargo build -p lockbook-linux --release
      - name: Upload server
        uses: actions/upload-artifact@v4
        with:
          name: lockbook-server
          path: target/release/lockbook-server
      - name: Upload CLI
        uses: actions/upload-artifact@v4
        with:
          name: lockbook-cli-linux
          path: target/release/lockbook
      - name: Upload egui
        uses: actions/upload-artifact@v4
        with:
          name: lockbook-egui-linux
          path: target/release/lockbook-egui
      - name: Upload linux
        uses: actions/upload-artifact@v4
        with:
          name: lockbook-linux
          path: target/release/lockbook-linux
