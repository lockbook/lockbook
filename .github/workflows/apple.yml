name: Apple Deployment

on:
  push:
    branches: [ master ]

jobs:
  DeployApple:
    if: github.repository == 'lockbook/lockbook'
    runs-on: [self-hosted, macOS]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CARGO_HOME: /home/parthmehrotra/lockbook-ci-cache/home
      CARGO_TARGET_DIR: /home/parthmehrotra/lockbook-ci-cache/target
    steps:
    - uses: actions/checkout@v4 
    - name: Build WS
      run: |
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        cargo r -p lbdev apple ws all
