name: Linux Build

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
        description: 'Cargo package to build (e.g., lockbook-server, lockbook)'
      artifact-name:
        required: true
        type: string
        description: 'Name for the uploaded artifact'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    if: github.repository == 'lockbook/lockbook'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        run: |
          sudo apt-get install -y pkg-config cmake libfontconfig1-dev libxkbcommon-x11-dev libglib2.0-dev libgtk-3-dev libgdk-pixbuf-2.0-dev
      - name: Build ${{ inputs.package }}
        run: cargo build -p ${{ inputs.package }} --release
      - name: Upload ${{ inputs.artifact-name }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: target/release/${{ inputs.package }}
