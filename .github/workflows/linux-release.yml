name: Linux Release Upload

on:
  workflow_dispatch:
  workflow_call:

jobs:
  upload-linux:
    if: github.repository == 'lockbook/lockbook'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config cmake libfontconfig1-dev libxkbcommon-x11-dev libglib2.0-dev libgtk-3-dev libgdk-pixbuf-2.0-dev
      - name: Upload CLI
        run: cargo run -p lbdev -- releaser linux cli gh
      - name: Upload desktop
        run: cargo run -p lbdev -- releaser linux desktop gh
