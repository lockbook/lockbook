name: Public Site Deploy

on:
  push:
    branches: [ master ]

jobs:
  Checks:
    if: github.repository == 'lockbook/lockbook'
    runs-on: [self-hosted, ci]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CARGO_HOME: /home/parth/lockbook-ci-cache/home
      CARGO_TARGET_DIR: /home/parth/lockbook-ci-cache/target
      NIXPKGS_ALLOW_UNFREE: 1
      NIXPKGS_ACCEPT_ANDROID_SDK_LICENSE: 1
    steps:
    - uses: actions/checkout@v2
    - name: Do it
      run: |
        cd public-site
        nix-shell -p zola google-cloud-sdk --command "
          export PATH=\$CARGO_HOME/bin:\$PATH
          rustup target add wasm32-unknown-unknown 
          cargo install trunk mdbook wasm-bindgen-cli 
          ./build.sh --deploy
        "

